spring:
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}
  flyway:
    locations: classpath:db/migration
    enabled: true
  jpa:
    properties:
      hibernate:
        ddl-auto: none
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

management:
  metrics:
    web:
      server:
        auto-time-requests: true
    enable:
      jvm:
        threads.peak: false
        threads.deamon: false
        classes.loaded: false
        classes.unloaded: false
      process.start.time: false
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

kafka:
  aiven:
    brokers: ${KAFKA_BROKERS}
    keystorePath: ${KAFKA_KEYSTORE_PATH:/dev/zero}
    truststorePath: ${KAFKA_KEYSTORE_PATH:/dev/zero}
    credstorePassword: ${KAFKA_CREDSTORE_PASSWORD:pwd}
  topics:
    producer:
      faktura-bestilt: ${KAFKA_TOPIC_NAME_FAKTURA_BESTILT}

#Token-validering
no.nav.security.jwt.issuer:
  aad:
    discovery-url: ${openidconnect-url}
    accepted-audience: ${accepted-audience}
